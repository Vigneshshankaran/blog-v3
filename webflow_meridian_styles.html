<!-- 
  MERIDIAN ELITE: Webflow Rich Text Port
  Instructions:
  1. Add a "Rich Text" element in Webflow.
  2. Give it the class name: meridian-rich-text
  3. Paste the <style> block into your Page Settings (Inside <head>).
  4. Paste the <script> block into your Page Settings (Before </body>).
-->

<style>
  :root {
    --color-primary: #0f172a;
    --color-body: #334155;
    --color-accent: #2563eb;
    --color-border: #e2e8f0;
    --space-6: 48px;
    --space-2: 16px;
    --radius-md: 8px;
    --font-sans: "Inter", system-ui, -apple-system, sans-serif;
  }

  /* Constraint & Layout */
  .meridian-rich-text {
    max-width: 680px !important;
    margin-left: 0 !important;
    margin-right: auto !important;
    font-family: var(--font-sans);
    color: var(--color-body);
    font-size: 18px;
    line-height: 1.7;
  }

  /* Global Hierarchy (400-500 Weight) */
  .meridian-rich-text h1,
  .meridian-rich-text h2,
  .meridian-rich-text h3 {
    color: var(--color-primary);
    font-weight: 500 !important;
    letter-spacing: -0.03em;
    margin-top: 1.5em;
    margin-bottom: 0.5em;
  }

  .meridian-rich-text p {
    margin-bottom: 1.25em;
    font-weight: 400;
  }

  .meridian-rich-text strong {
    font-weight: 500 !important;
    color: var(--color-primary);
  }

  /* The Elite Drop Cap */
  .meridian-rich-text p:first-child::first-letter {
    float: left;
    font-size: 4.2em;
    line-height: 0.8;
    padding-top: 4px;
    padding-right: 12px;
    font-weight: 500;
    color: var(--color-accent);
  }

  /* Statement Quotes */
  .meridian-rich-text blockquote {
    margin: var(--space-6) 0;
    padding: var(--space-6);
    background: #f8fafc;
    border-radius: 16px;
    border-left: none;
    position: relative;
    font-style: italic;
    font-size: 24px;
    color: var(--color-primary);
    font-weight: 500;
    text-align: center;
  }

  .meridian-rich-text blockquote::before {
    content: "“";
    position: absolute;
    top: -20px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 80px;
    color: var(--color-accent);
    opacity: 0.15;
    font-family: serif;
  }

  /* Financial Tables */
  .meridian-rich-text table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    margin: var(--space-6) 0;
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    overflow: hidden;
  }

  .meridian-rich-text th {
    background: #f8fafc;
    text-align: left;
    padding: 12px 16px;
    font-weight: 500;
    color: var(--color-primary);
    border-bottom: 1px solid var(--color-border);
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .meridian-rich-text td {
    padding: 12px 16px;
    border-bottom: 1px solid var(--color-border);
    font-size: 15px;
  }

  /* Footnote Triggers */
  .footnote-ref {
    font-size: 0.75em;
    vertical-align: super;
    color: var(--color-accent);
    text-decoration: none;
    font-weight: 500;
    cursor: pointer;
  }

  .footnote-preview {
    position: fixed;
    background: white;
    border: 1px solid var(--color-border);
    box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 13px;
    z-index: 9999;
    pointer-events: none;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.3s ease;
  }
  /* --- NEW COMPONENTS --- */
  .keytakeaways_component {
    background: #f8fafc;
    border-radius: 16px;
    padding: 40px;
    margin-bottom: 64px;
    border: 1px solid #e2e8f0;
  }
  .keytakeaways_heading {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 24px;
    color: #0f172a;
  }
  .keytakeaways_heading h2 {
    font-size: 20px !important;
    font-weight: 500 !important;
    margin: 0 !important;
  }
  .single-testimonial-item-2 {
    background: white;
    border: 1px solid #e2e8f0;
    border-radius: 20px;
    padding: 40px;
    margin: 64px 0;
    box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
  }
  .testimonial-two-user-info {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
  }
  .testimonial-two-user-image-2 {
    width: 48px;
    height: 48px;
    border-radius: 50%;
  }
  .newsletter-area-2 {
    background: #0f172a;
    color: white;
    border-radius: 24px;
    padding: 64px;
    text-align: center;
  }
  .newsletter-form-button-2 {
    background: white;
    color: #0f172a;
    border-radius: 12px;
    padding: 12px 24px;
    font-weight: 500;
  }
</style>

<script>
  // Footnote Data
  const footnotes = {
    1: {
      title: "Reg-Tech Insight",
      content: "Based on 2025 compliance benchmarks.",
    },
    2: {
      title: "API Stats",
      content: "Growth tracked via Meridian public API logs.",
    },
  };

  // Create Preview Element
  const preview = document.createElement("div");
  preview.className = "footnote-preview";
  document.body.appendChild(preview);

  // Hook up hover events
  // In Webflow Rich Text, use a link with URL starting with #fn1 #fn2 etc.
  document.querySelectorAll('a[href^="#fn"]').forEach((link) => {
    link.classList.add("footnote-ref");
    const id = link.getAttribute("href").replace("#fn", "");

    link.addEventListener("mouseenter", (e) => {
      const data = footnotes[id];
      if (data) {
        preview.innerHTML = `<strong>${data.title}</strong><br>${data.content}`;
        preview.style.opacity = "1";
        preview.style.transform = "translateY(0)";
        const rect = link.getBoundingClientRect();
        preview.style.left = rect.left + "px";
        preview.style.top = rect.top - 60 + "px";
      }
    });

    link.addEventListener("mouseleave", () => {
      preview.style.opacity = "0";
      preview.style.transform = "translateY(10px)";
    });
  });
</script>
